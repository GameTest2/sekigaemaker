<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>男女固定 席替えメーカー（完全自動保存＆前配置表示版）</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 5px; padding-left: 140px; }
        p { color: #666; font-size: 14px; margin-bottom: 5px; }
        
        #save-status {
            font-size: 12px;
            color: #27ae60;
            font-weight: bold;
            height: 15px;
            margin-bottom: 15px;
        }

        /* 左側メニュー（サイドバー） */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -350px;
            width: 310px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 999;
            text-align: left;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 998;
        }
        .sidebar-overlay.show { display: block; }

        /* タブ */
        .tab-buttons { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 15px; margin-top: 60px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; border: none; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: #34495e; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 設定項目 */
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        textarea { width: 100%; height: 120px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-size: 13px; box-sizing: border-box; }
        .size-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .size-group, .rate-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        .size-group input[type="number"] { width: 50px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            user-select: none;
        }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .rate-group input[type="range"] { flex: 1; cursor: pointer; }

        .button-container { margin-bottom: 20px; display: flex; justify-content: center; }
        #shuffle-btn {
            border: none; padding: 15px 50px; font-size: 20px; font-weight: bold; border-radius: 6px;
            cursor: pointer; background-color: #2ecc71; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #shuffle-btn:hover { background-color: #27ae60; }

        /* ★新設：前の配置（履歴）エリアのスタイル */
        .previous-container {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background-color: #eaeaea;
            border-radius: 8px;
            border: 1px dashed #bbb;
        }
        .previous-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: left;
        }
        .previous-classroom {
            display: grid;
            gap: 8px;
        }
        .prev-seat {
            box-sizing: border-box;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 2px;
            border-radius: 4px;
            border: 1px solid #aaa;
            background-color: #fff;
            color: #333;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* メインの黒板と座席 */
        .blackboard { background-color: #2e4d3c; color: white; width: 400px; margin: 0 auto 20px auto; padding: 12px; border: 4px solid #8b5a2b; border-radius: 3px; font-weight: bold; font-size: 18px; }
        .classroom { display: grid; gap: 15px; max-width: 1200px; margin: 0 auto; padding: 25px; background-color: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .seat {
            box-sizing: border-box; font-size: 20px; font-weight: bold; line-height: 1.3; word-break: break-all;
            border-radius: 8px; border: 2px solid #ccc; cursor: pointer; user-select: none;
            min-height: 80px; padding: 10px 5px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
        }
        .seat:hover { transform: scale(1.03); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .boy-seat { background-color: #e3f2fd; color: #0d47a1; border-color: #64b5f6; }
        .girl-seat { background-color: #fce4ec; color: #880e4f; border-color: #f06292; }
        .empty-seat { background-color: #eeeeee; color: #9e9e9e; border-color: #bdbdbd; border-style: dashed; }
        .selected-seat { background-color: #fff59d !important; border-color: #fbc02d !important; color: #f57f17 !important; }
        
        .shuffling { animation: pulse 0.15s infinite alternate; background-color: #fff9c4 !important; border-color: #fff59d !important; color: #333 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(0.96); } }
    </style>
</head>
<body>

    <button class="menu-toggle" id="menu-toggle">☰ メニュー</button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('rule-tab')">生成ルール</button>
            <button class="tab-btn" onclick="switchTab('config-tab')">名前・大きさ</button>
        </div>

        <div id="rule-tab" class="tab-content active">
            <label class="checkbox-group">
                <input type="checkbox" id="rule-mix-gender">
                <span>男女を分けない</span>
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="rule-no-same-neighbor">
                <span>隣を前の席と合わせない</span>
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="rule-play-effect" checked>
                <span>演出（シャッフルアニメ）</span>
            </label>
            <div class="rate-group" style="margin-top: 20px;">
                <label for="rate-slider">シャッフルする割合:</label>
                <input type="range" id="rate-slider" min="10" max="100" value="100" step="10">
                <span id="rate-value" style="color:#e67e22; font-size:16px;">100%</span>
            </div>
        </div>

        <div id="config-tab" class="tab-content">
            <div class="input-group">
                <label for="boys-input">男子の名前（改行区切り）</label>
                <textarea id="boys-input">男子A&#13;男子B&#13;男子C&#13;男子D&#13;男子E&#13;男子F&#13;男子G&#13;男子H&#13;男子I&#13;男子J&#13;男子K&#13;男子L&#13;男子M&#13;男子N&#13;男子O</textarea>
            </div>
            <div class="input-group">
                <label for="girls-input">女子の名前（改行区切り）</label>
                <textarea id="girls-input">女子A&#13;女子B&#13;女子C&#13;女子D&#13;女子E&#13;女子F&#13;女子G&#13;女子H&#13;女子I&#13;女子J&#13;女子K&#13;女子L&#13;女子M&#13;女子N&#13;女子O</textarea>
            </div>
            <div class="size-container">
                <div class="size-group">
                    <label for="row-input">縦の行数:</label>
                    <input type="number" id="row-input" min="1" max="10" value="5"> 行
                </div>
                <div class="size-group">
                    <label for="col-input">横の列数:</label>
                    <input type="number" id="col-input" min="1" max="10" value="6"> 列
                </div>
            </div>
            <p style="font-size:11px; color:#e74c3c; font-weight:bold; margin-top:10px;">※変更はすべてリアルタイムで自動保存・反映されます。</p>
        </div>
    </div>

    <h1>男女固定 席替えメーカー</h1>
    <p>変更はすべて自動保存。席替えボタンを押すと、現在の配置が自動的に「前の配置」へ移ります。</p>
    <div id="save-status"></div>

    <!-- ★新設：前の配置（履歴）表示エリア -->
    <div class="previous-container" id="previous-container" style="display:none;">
        <div class="previous-title">⏮ 前の座席配置（比較用履歴）</div>
        <div class="previous-classroom" id="previous-classroom"></div>
    </div>

    <div class="button-container">
        <button id="shuffle-btn">席替えを実行する</button>
    </div>

    <div class="blackboard">黒板（前方）</div>
    <div class="classroom" id="classroom"></div>

    <script>
// =================================================================
// 席替えJS 分割【1/2】: 画面生成・リアルタイム同期・操作管理
// =================================================================

let currentBoys = [];
let currentGirls = [];
let seats = [];
let selectedSeat = null;

let lastNeighborsPair = []; 
let previousSeatsData = []; // ★新設：前回の名前配置の履歴を保存する配列

const classroom = document.getElementById('classroom');
const previousContainer = document.getElementById('previous-container');
const previousClassroom = document.getElementById('previous-classroom');
const statusDiv = document.getElementById('save-status');
const rateSlider = document.getElementById('rate-slider');
const rateValue = document.getElementById('rate-value');

const sidebar = document.getElementById('sidebar');
const menuToggle = document.getElementById('menu-toggle');
const sidebarOverlay = document.getElementById('sidebar-overlay');

if (menuToggle && sidebar && sidebarOverlay) {
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show');
    });
    sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    });
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
    const targetContent = document.getElementById(tabId);
    if (targetContent) targetContent.classList.add('active');
}

if (rateSlider && rateValue) {
    rateSlider.addEventListener('input', (e) => {
        rateValue.textContent = e.target.value + "%";
    });
}

function showSaveStatus() {
    if (statusDiv) {
        statusDiv.textContent = "自動保存されました";
        setTimeout(() => { statusDiv.textContent = ""; }, 1500);
    }
}

function updateNamesFromInput() {
    const boysInput = document.getElementById('boys-input').value;
    const girlsInput = document.getElementById('girls-input').value;
    currentBoys = boysInput.split('\n').map(name => name.trim()).filter(name => name !== "");
    currentGirls = girlsInput.split('\n').map(name => name.trim()).filter(name => name !== "");
}

function toggleSeatGender(seat) {
    if (selectedSeat) {
        selectedSeat.classList.remove('selected-seat');
        selectedSeat = null;
    }
    const currentGender = seat.getAttribute('data-gender');
    if (currentGender === 'boy') {
        seat.setAttribute('data-gender', 'girl');
        seat.classList.remove('boy-seat');
        seat.classList.add('girl-seat');
    } else if (currentGender === 'girl') {
        seat.setAttribute('data-gender', 'empty');
        seat.classList.remove('girl-seat');
        seat.classList.add('empty-seat');
    } else {
        seat.setAttribute('data-gender', 'boy');
        seat.classList.remove('empty-seat');
        seat.classList.add('boy-seat');
    }
    displayNames();
    saveData();
}

function buildClassroom(savedPatterns = null) {
    const rows = parseInt(document.getElementById('row-input').value) || 5;
    const cols = parseInt(document.getElementById('col-input').value) || 6;

    classroom.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    classroom.innerHTML = '';
    seats = [];
    selectedSeat = null;

    const totalSeats = rows * cols;
    for (let i = 0; i < totalSeats; i++) {
        const seat = document.createElement('div');
        seat.classList.add('seat');
        
        let genderType = 'boy';
        if (savedPatterns && savedPatterns[i]) {
            genderType = savedPatterns[i];
        } else {
            genderType = (i % 2 === 0) ? 'boy' : 'girl';
        }

        seat.setAttribute('data-gender', genderType);
        seat.classList.add(`${genderType}-seat`);

        seat.addEventListener('dblclick', (e) => { e.preventDefault(); toggleSeatGender(seat); });

        let pressTimer = null;
        let isLongPress = false;
        const startPress = () => {
            isLongPress = false;
            pressTimer = setTimeout(() => { isLongPress = true; toggleSeatGender(seat); }, 600);
        };
        const endPress = () => clearTimeout(pressTimer);

        seat.addEventListener('mousedown', startPress);
        seat.addEventListener('mouseup', endPress);
        seat.addEventListener('mouseleave', endPress);
        seat.addEventListener('touchstart', startPress, {passive: true});
        seat.addEventListener('touchend', endPress, {passive: true});

        seat.addEventListener('click', () => {
            if (isLongPress) return;
            const gender = seat.getAttribute('data-gender');

            if (gender !== 'empty' && seat.textContent !== "（空席）" && seat.textContent !== "") {
                if (!selectedSeat) {
                    selectedSeat = seat;
                    seat.classList.add('selected-seat');
                } else {
                    if (selectedSeat === seat) {
                        selectedSeat.classList.remove('selected-seat');
                        selectedSeat = null;
                        return;
                    }
                    const firstGender = selectedSeat.getAttribute('data-gender');
                    const secondGender = seat.getAttribute('data-gender');
                    const mixGenderRule = document.getElementById('rule-mix-gender').checked;

                    if (firstGender === secondGender || mixGenderRule) {
                        const tempText = selectedSeat.textContent;
                        selectedSeat.textContent = seat.textContent;
                        seat.textContent = tempText;
                        syncSeatTextToArrays(); 
                    } else {
                        alert("男女固定ルールが有効です。違う性別の席とは手動入れ替えできません！");
                    }
                    selectedSeat.classList.remove('selected-seat');
                    selectedSeat = null;
                    saveData();
                }
            }
        });

        classroom.appendChild(seat);
        seats.push(seat);
    }
}

function displayNames() {
    let boyIndex = 0;
    let girlIndex = 0;
    let totalIndex = 0;
    const mixGenderRule = document.getElementById('rule-mix-gender').checked;
    const allMembers = [...currentBoys, ...currentGirls];

    seats.forEach(seat => {
        const gender = seat.getAttribute('data-gender');
        if (gender !== 'empty') {
            if (mixGenderRule) {
                seat.textContent = allMembers[totalIndex] || "（空席）";
                totalIndex++;
            } else {
                if (gender === 'boy') {
                    seat.textContent = currentBoys[boyIndex] || "（空席）";
                    boyIndex++;
                } else if (gender === 'girl') {
                    seat.textContent = currentGirls[girlIndex] || "（空席）";
                    girlIndex++;
                }
            }
        } else {
            seat.textContent = "【空席】";
        }
    });
}

// ★新設：前回の配置データを上のミニ座席に描画する関数
function drawPreviousClassroom() {
    if (!previousSeatsData || previousSeatsData.length === 0) {
        previousContainer.style.display = 'none';
        return;
    }
    const cols = parseInt(document.getElementById('col-input').value) || 6;
    previousClassroom.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    previousClassroom.innerHTML = '';

    previousSeatsData.forEach(name => {
        const prevSeat = document.createElement('div');
        prevSeat.classList.add('prev-seat');
        prevSeat.textContent = name;
        previousClassroom.appendChild(prevSeat);
    });
    previousContainer.style.display = 'block';
}
// =================================================================
// 席替えJS 分割【2/2】: アルゴリズム・完全自動同期・履歴処理
// =================================================================

function syncSeatTextToArrays() {
    const mixGenderRule = document.getElementById('rule-mix-gender').checked;
    if (mixGenderRule) {
        const all = [];
        seats.forEach(seat => {
            const txt = seat.textContent;
            if (txt && txt !== "（空席）" && txt !== "【空席】") all.push(txt);
        });
        currentBoys = all.slice(0, Math.ceil(all.length / 2));
        currentGirls = all.slice(Math.ceil(all.length / 2));
    } else {
        const newBoys = [];
        const newGirls = [];
        seats.forEach(seat => {
            const gender = seat.getAttribute('data-gender');
            const text = seat.textContent;
            if (text !== "（空席）" && text !== "【空席】" && text !== "") {
                if (gender === 'boy') newBoys.push(text);
                if (gender === 'girl') newGirls.push(text);
            }
        });
        currentBoys = newBoys;
        currentGirls = newGirls;
    }
}

function collectCurrentNeighbors() {
    const cols = parseInt(document.getElementById('col-input').value) || 6;
    const pairs = [];
    for (let i = 0; i < seats.length; i++) {
        if ((i + 1) % cols !== 0 && (i + 1) < seats.length) {
            const nameA = seats[i].textContent;
            const nameB = seats[i+1].textContent;
            if (nameA && nameB && nameA !== "（空席）" && nameB !== "（空席）" && nameA !== "【空席】" && nameB !== "【空席】") {
                pairs.push(`${nameA}-${nameB}`);
                pairs.push(`${nameB}-${nameA}`);
            }
        }
    }
    return pairs;
}

function partialShuffle(array, rate) {
    if (array.length <= 1) return;
    let targetCount = Math.round(array.length * (rate / 100));
    if (targetCount < 2 && rate > 0) targetCount = 2;
    if (targetCount > array.length) targetCount = array.length;

    const indices = [];
    while (indices.length < targetCount) {
        const randIdx = Math.floor(Math.random() * array.length);
        if (!indices.includes(randIdx)) indices.push(randIdx);
    }

    const targetValues = indices.map(idx => array[idx]);
    for (let i = targetValues.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [targetValues[i], targetValues[j]] = [targetValues[j], targetValues[i]];
    }
    indices.forEach((originalIdx, i) => { array[originalIdx] = targetValues[i]; });
}

function executeShuffleCalculation() {
    const rate = rateSlider ? parseInt(rateSlider.value) : 100;
    const mixGenderRule = document.getElementById('rule-mix-gender').checked;
    const noSameNeighborRule = document.getElementById('rule-no-same-neighbor').checked;

    syncSeatTextToArrays();

    let attempts = 0;
    while (attempts < 100) {
        if (mixGenderRule) {
            let allMembers = [...currentBoys, ...currentGirls];
            partialShuffle(allMembers, rate);
            currentBoys = allMembers.slice(0, currentBoys.length);
            currentGirls = allMembers.slice(currentBoys.length);
        } else {
            partialShuffle(currentBoys, rate);
            partialShuffle(currentGirls, rate);
        }

        displayNames();

        if (noSameNeighborRule && lastNeighborsPair.length > 0) {
            const currentPairs = collectCurrentNeighbors();
            const hasOverlap = currentPairs.some(pair => lastNeighborsPair.includes(pair));
            if (!hasOverlap) break;
            attempts++;
        } else {
            break; 
        }
    }
}

function saveData() {
    const data = {
        boysInput: document.getElementById('boys-input').value,
        girlsInput: document.getElementById('girls-input').value,
        rows: document.getElementById('row-input').value,
        cols: document.getElementById('col-input').value,
        patterns: seats.map(seat => seat.getAttribute('data-gender')),
        currentBoys: currentBoys,
        currentGirls: currentGirls,
        rate: rateSlider ? rateSlider.value : 100,
        mixGender: document.getElementById('rule-mix-gender').checked,
        noSameNeighbor: document.getElementById('rule-no-same-neighbor').checked,
        playEffect: document.getElementById('rule-play-effect').checked,
        lastNeighborsPair: lastNeighborsPair,
        previousSeatsData: previousSeatsData // 履歴データも一緒に保存
    };
    localStorage.setItem('sekigae_maker_config_v4', JSON.stringify(data));
    showSaveStatus();
}

function loadData() {
    const savedData = localStorage.getItem('sekigae_maker_config_v4');
    if (savedData) {
        const data = JSON.parse(savedData);
        document.getElementById('boys-input').value = data.boysInput;
        document.getElementById('girls-input').value = data.girlsInput;
        document.getElementById('row-input').value = data.rows;
        document.getElementById('col-input').value = data.cols;
        
        document.getElementById('rule-mix-gender').checked = data.mixGender || false;
        document.getElementById('rule-no-same-neighbor').checked = data.noSameNeighbor || false;
        document.getElementById('rule-play-effect').checked = (data.playEffect !== undefined) ? data.playEffect : true;
        lastNeighborsPair = data.lastNeighborsPair || [];
        previousSeatsData = data.previousSeatsData || [];

        if (rateSlider && data.rate) {
            rateSlider.value = data.rate;
            rateValue.textContent = rateSlider.value + "%";
        }

        currentBoys = data.currentBoys || [];
        currentGirls = data.currentGirls || [];

        buildClassroom(data.patterns);
        displayNames();
        drawPreviousClassroom(); // 履歴を上部に描画
    } else {
        handleApply();
    }
}

// 設定変更時などの自動リアルタイム更新（反映ボタンなしで即座に連動）
function handleApply() {
    buildClassroom();
    updateNamesFromInput();
    displayNames();
    saveData();
}

// 席替え実行ボタン
document.getElementById('shuffle-btn').addEventListener('click', () => {
    if (selectedSeat) {
        selectedSeat.classList.remove('selected-seat');
        selectedSeat = null;
    }

    // ★席替えの直前に、現在の並びを「前の配置（履歴）」としてそっくり記録
    previousSeatsData = seats.map(seat => seat.textContent);
    drawPreviousClassroom();

    lastNeighborsPair = collectCurrentNeighbors();
    const playEffect = document.getElementById('rule-play-effect').checked;

    if (playEffect) {
        let duration = 800;
        let intervalTime = 60;
        seats.forEach(seat => { if(seat.getAttribute('data-gender') !== 'empty') seat.classList.add('shuffling'); });
        let timer = setInterval(() => { executeShuffleCalculation(); }, intervalTime);
        setTimeout(() => {
            clearInterval(timer);
            seats.forEach(seat => seat.classList.remove('shuffling'));
            executeShuffleCalculation(); 
            saveData();
        }, duration);
    } else {
        executeShuffleCalculation();
        saveData();
    }
});
