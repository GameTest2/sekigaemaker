<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>男女固定 席替えメーカー（手動トレード＆割合指定版）</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 5px; }
        .notice { color: #2c3e50; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
        .notice span { color: #e74c3c; }
        
        /* 保存メッセージ表示 */
        #save-status {
            font-size: 12px;
            color: #27ae60;
            font-weight: bold;
            height: 15px;
            margin-bottom: 15px;
        }

        /* 設定エリアのレイアウト */
        .config-wrapper {
            max-width: 900px;
            margin: 0 auto 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .setup-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        label { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            font-size: 14px;
        }

        /* カスタム設定エリア */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
        .size-container, .shuffle-rate-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
            font-weight: bold;
        }
        .size-group, .rate-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .size-group input[type="number"] {
            width: 60px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .rate-group input[type="range"] {
            width: 200px;
            cursor: pointer;
        }
        #rate-value {
            color: #e67e22;
            font-size: 18px;
            display: inline-block;
            width: 50px;
        }

        /* 操作ボタン */
        .button-container { margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; }
        button {
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        #apply-btn { background-color: #34495e; color: white; }
        #apply-btn:hover { background-color: #2c3e50; }
        #shuffle-btn { background-color: #2ecc71; color: white; }
        #shuffle-btn:hover { background-color: #27ae60; }

        /* 黒板 */
        .blackboard {
            background-color: #2e4d3c;
            color: white;
            width: 400px;
            margin: 0 auto 30px auto;
            padding: 12px;
            border: 4px solid #8b5a2b;
            border-radius: 3px;
            font-weight: bold;
            font-size: 18px;
        }

        /* 座席のグリッド */
        .classroom {
            display: grid;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 座席のデザイン */
        .seat {
            box-sizing: border-box;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.3;
            word-break: break-all;
            border-radius: 8px;
            border: 2px solid #ccc;
            cursor: pointer;
            user-select: none;
            min-height: 80px;
            padding: 10px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            position: relative;
        }
        .seat:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 各座席のタイプ別色分け */
        .boy-seat { background-color: #e3f2fd; color: #0d47a1; border-color: #64b5f6; }
        .girl-seat { background-color: #fce4ec; color: #880e4f; border-color: #f06292; }
        .empty-seat { background-color: #eeeeee; color: #9e9e9e; border-color: #bdbdbd; border-style: dashed; }
        
        /* ★手動入れ替え用の選択された座席のハイライト */
        .selected-seat {
            background-color: #fff59d !important;
            border-color: #fbc02d !important;
            color: #f57f17 !important;
            box-shadow: 0 0 10px #fbc02d;
        }
    </style>
</head>
<body>

    <h1>男女固定 席替えメーカー</h1>
    <p>①「大きさ」を指定して座席作成後、座席を直接クリックして「性別枠の変更」や「名前の手動トレード」ができます。</p>
    <p class="notice">【手動トレード】同じ性別の座席を2つ順にクリックすると、<span>中の名前だけを入れ替える</span>ことができます！</p>
    <div id="save-status"></div>

    <div class="config-wrapper">
        <!-- 名前の入力設定エリア -->
        <div class="setup-container">
            <div class="input-group">
                <label for="boys-input">男子の名前（改行区切り）</label>
                <textarea id="boys-input">男子A&#13;男子B&#13;男子C&#13;男子D&#13;男子E&#13;男子F&#13;男子G&#13;男子H&#13;男子I&#13;男子J&#13;男子K&#13;男子L&#13;男子M&#13;男子N&#13;男子O</textarea>
            </div>
            <div class="input-group">
                <label for="girls-input">女子の名前（改行区切り）</label>
                <textarea id="girls-input">女子A&#13;女子B&#13;女子C&#13;女子D&#13;女子E&#13;女子F&#13;女子G&#13;女子H&#13;女子I&#13;女子J&#13;女子K&#13;女子L&#13;女子M&#13;女子N&#13;女子O</textarea>
            </div>
        </div>

        <div class="control-panel">
            <!-- クラスの大きさ指定 -->
            <div class="size-container">
                <div class="size-group">
                    <label for="row-input">縦の行数（奥行き）:</label>
                    <input type="number" id="row-input" min="1" max="10" value="5"> 行
                </div>
                <div class="size-group">
                    <label for="col-input">横の列数（並び）:</label>
                    <input type="number" id="col-input" min="1" max="10" value="6"> 列
                </div>
            </div>

            <!-- ★シャッフル割合の設定スライダー -->
            <div class="shuffle-rate-container">
                <div class="rate-group">
                    <label for="rate-slider">シャッフルする割合:</label>
                    <input type="range" id="rate-slider" min="10" max="100" value="100" step="10">
                    <span id="rate-value">100%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- コントロールボタン -->
    <div class="button-container">
        <button id="apply-btn">① 設定を反映して座席作成</button>
        <button id="shuffle-btn">② 指定割合で席替えを実行</button>
    </div>

    <div class="blackboard">黒板（前方）</div>

    <!-- 座席エリア -->
    <div class="classroom" id="classroom"></div>
    <script>
// =================================================================
// 【操作改善版】長押し・ダブルクリック対応 JavaScript ロジック
// =================================================================

let currentBoys = [];
let currentGirls = [];
let seats = [];
let selectedSeat = null; // 手動トレード用

const classroom = document.getElementById('classroom');
const statusDiv = document.getElementById('save-status');
const rateSlider = document.getElementById('rate-slider');
const rateValue = document.getElementById('rate-value');

// シャッフル割合スライダーの数値表示連動
if (rateSlider && rateValue) {
    rateSlider.addEventListener('input', (e) => {
        rateValue.textContent = e.target.value + "%";
    });
}

function showSaveStatus() {
    if (statusDiv) {
        statusDiv.textContent = "データをブラウザに自動保存しました！";
        setTimeout(() => { statusDiv.textContent = ""; }, 2000);
    }
}

function updateNamesFromInput() {
    const boysInput = document.getElementById('boys-input').value;
    const girlsInput = document.getElementById('girls-input').value;
    currentBoys = boysInput.split('\n').map(name => name.trim()).filter(name => name !== "");
    currentGirls = girlsInput.split('\n').map(name => name.trim()).filter(name => name !== "");
}

// 男女・空席の枠を切り替える共通処理
function toggleSeatGender(seat) {
    if (selectedSeat) {
        selectedSeat.classList.remove('selected-seat');
        selectedSeat = null;
    }

    const currentGender = seat.getAttribute('data-gender');
    if (currentGender === 'boy') {
        seat.setAttribute('data-gender', 'girl');
        seat.classList.remove('boy-seat');
        seat.classList.add('girl-seat');
    } else if (currentGender === 'girl') {
        seat.setAttribute('data-gender', 'empty');
        seat.classList.remove('girl-seat');
        seat.classList.add('empty-seat');
    } else {
        seat.setAttribute('data-gender', 'boy');
        seat.classList.remove('empty-seat');
        seat.classList.add('boy-seat');
    }
    
    displayNames();
    saveData();
}

// 指定された行数・列数で座席を作り直す
function buildClassroom(savedPatterns = null) {
    const rows = parseInt(document.getElementById('row-input').value) || 5;
    const cols = parseInt(document.getElementById('col-input').value) || 6;

    classroom.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    classroom.innerHTML = '';
    seats = [];
    selectedSeat = null;

    const totalSeats = rows * cols;
    for (let i = 0; i < totalSeats; i++) {
        const seat = document.createElement('div');
        seat.classList.add('seat');
        
        let genderType = 'boy';
        if (savedPatterns && savedPatterns[i]) {
            genderType = savedPatterns[i];
        } else {
            genderType = (i % 2 === 0) ? 'boy' : 'girl';
        }

        seat.setAttribute('data-gender', genderType);
        seat.classList.add(`${genderType}-seat`);

        // --- 長押し判定用の変数 ---
        let pressTimer = null;
        let isLongPress = false;

        // 【操作方法1】ダブルクリックで「男・女・空席」を変更
        seat.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleSeatGender(seat);
        });

        // 長押し（タッチ開始 / マウスダウン）
        const startPress = () => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                toggleSeatGender(seat); // 枠を変更
            }, 600); // 0.6秒長押しで切り替え
        };

        // 長押し解除（指を離す / マウスアップ / エリア外に出る）
        const endPress = () => {
            clearTimeout(pressTimer);
        };

        // マウスとタッチのイベント登録
        seat.addEventListener('mousedown', startPress);
        seat.addEventListener('mouseup', endPress);
        seat.addEventListener('mouseleave', endPress);
        seat.addEventListener('touchstart', (e) => { startPress(); }, {passive: true});
        seat.addEventListener('touchend', endPress, {passive: true});
        seat.addEventListener('touchcancel', endPress, {passive: true});

        // 【操作方法2】普通のクリック（短押し）で手動トレード
        seat.addEventListener('click', (e) => {
            // 長押しだった場合や、ダブルクリックの1回目は通常のトレード処理をスキップ
            if (isLongPress) return;

            const gender = seat.getAttribute('data-gender');

            // 1つ目の座席を選択
            if (!selectedSeat) {
                // 空席マスはトレード対象外
                if (gender === 'empty') return;
                selectedSeat = seat;
                seat.classList.add('selected-seat');
            } 
            // 2つ目の座席を選択（トレード実行）
            else {
                // 選択したのが自分自身ならキャンセル
                if (selectedSeat === seat) {
                    selectedSeat.classList.remove('selected-seat');
                    selectedSeat = null;
                    return;
                }

                const firstGender = selectedSeat.getAttribute('data-gender');
                const secondGender = seat.getAttribute('data-gender');

                // 同じ性別の枠同士であれば入れ替えを許可
                if (firstGender === secondGender) {
                    // もしどちらかが空の場合の文字も考慮して安全に入れ替え
                    const tempText = selectedSeat.textContent;
                    selectedSeat.textContent = seat.textContent;
                    seat.textContent = tempText;
                    syncSeatTextToArrays(); 
                } else {
                    alert("違う性別の席とは手動入れ替えできません！");
                }
                
                selectedSeat.classList.remove('selected-seat');
                selectedSeat = null;
                saveData();
            }
        });

        classroom.appendChild(seat);
        seats.push(seat);
    }
}

// 現在のリスト順で座席に名前を表示する
function displayNames() {
    let boyIndex = 0;
    let girlIndex = 0;

    seats.forEach(seat => {
        const gender = seat.getAttribute('data-gender');
        if (gender === 'boy') {
            seat.textContent = currentBoys[boyIndex] || "（空席）";
            boyIndex++;
        } else if (gender === 'girl') {
            seat.textContent = currentGirls[girlIndex] || "（空席）";
            girlIndex++;
        } else if (gender === 'empty') {
            seat.textContent = "【空席】";
        }
    });
}

function syncSeatTextToArrays() {
    const newBoys = [];
    const newGirls = [];
    seats.forEach(seat => {
        const gender = seat.getAttribute('data-gender');
        const text = seat.textContent;
        if (text !== "（空席）" && text !== "【空席】" && text !== "") {
            if (gender === 'boy') newBoys.push(text);
            if (gender === 'girl') newGirls.push(text);
        }
    });
    currentBoys = newBoys;
    currentGirls = newGirls;
}

function partialShuffle(array, rate) {
    if (array.length <= 1) return;
    let targetCount = Math.round(array.length * (rate / 100));
    if (targetCount < 2 && rate > 0) targetCount = 2;
    if (targetCount > array.length) targetCount = array.length;

    const indices = [];
    while (indices.length < targetCount) {
        const randIdx = Math.floor(Math.random() * array.length);
        if (!indices.includes(randIdx)) indices.push(randIdx);
    }

    const targetValues = indices.map(idx => array[idx]);
    for (let i = targetValues.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [targetValues[i], targetValues[j]] = [targetValues[j], targetValues[i]];
    }

    indices.forEach((originalIdx, i) => {
        array[originalIdx] = targetValues[i];
    });
}

function saveData() {
    const data = {
        boysInput: document.getElementById('boys-input').value,
        girlsInput: document.getElementById('girls-input').value,
        rows: document.getElementById('row-input').value,
        cols: document.getElementById('col-input').value,
        patterns: seats.map(seat => seat.getAttribute('data-gender')),
        currentBoys: currentBoys,
        currentGirls: currentGirls,
        rate: rateSlider ? rateSlider.value : 100
    };
    localStorage.setItem('sekigae_maker_config_v2', JSON.stringify(data));
    showSaveStatus();
}

function loadData() {
    const savedData = localStorage.getItem('sekigae_maker_config_v2');
    if (savedData) {
        const data = JSON.parse(savedData);
        document.getElementById('boys-input').value = data.boysInput;
        document.getElementById('girls-input').value = data.girlsInput;
        document.getElementById('row-input').value = data.rows;
        document.getElementById('col-input').value = data.cols;
        
        if (rateSlider && data.rate) {
            rateSlider.value = data.rate;
            rateValue.textContent = rateSlider.value + "%";
        }

        currentBoys = data.currentBoys || [];
        currentGirls = data.currentGirls || [];

        buildClassroom(data.patterns);
        displayNames();
    } else {
        handleApply();
    }
}

function handleApply() {
    buildClassroom();
    updateNamesFromInput();
    displayNames();
    saveData();
}

document.getElementById('shuffle-btn').addEventListener('click', () => {
    if (selectedSeat) {
        selectedSeat.classList.remove('selected-seat');
        selectedSeat = null;
    }
    syncSeatTextToArrays();
    const rate = rateSlider ? parseInt(rateSlider.value) : 100;
    partialShuffle(currentBoys, rate);
    partialShuffle(currentGirls, rate);
    displayNames();
    saveData();
});

document.getElementById('apply-btn').addEventListener('click', handleApply);
document.getElementById('boys-input').addEventListener('input', saveData);
document.getElementById('girls-input').addEventListener('input', saveData);

loadData();
</script>
</body>
</html>
